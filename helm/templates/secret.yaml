{{/*
Secret management notes:
  By default, kraclaw expects the following Secrets to be pre-created before helm install:
    - {{ .Values.mysql.secretName }} (key: MYSQL_DSN)
    - {{ .Values.credproxy.secretName }} (key: ANTHROPIC_API_KEY)
    - {{ .Values.tls.secretName }} (keys: tls.crt, tls.key, ca.crt — if grpcInsecure=false)

  For dev/test, set secrets.create=true and provide secrets.mysqlDsn and secrets.anthropicApiKey
  to have Helm create them. NEVER use this in production (values files are not encrypted).
*/}}
{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mysql.secretName }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kraclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_DSN: {{ .Values.secrets.mysqlDsn | required "secrets.mysqlDsn is required when secrets.create=true" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.credproxy.secretName }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kraclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
{{- end }}
