apiVersion: v1
kind: Service
metadata:
  name: {{ include "kraclaw.fullname" . }}-grpc
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kraclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{ include "kraclaw.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
