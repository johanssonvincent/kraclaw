{{- if .Values.networkPolicy.credProxy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kraclaw.fullname" . }}-credproxy
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kraclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{ include "kraclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to Anthropic API (api.anthropic.com) on HTTPS
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
