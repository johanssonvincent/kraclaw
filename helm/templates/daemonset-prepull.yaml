{{- if and .Values.sandbox.fastStart.enabled .Values.prepull.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kraclaw.fullname" . }}-agent-prepull
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kraclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: prepull
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kraclaw.name" . }}
      app.kubernetes.io/component: prepull
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kraclaw.name" . }}
        app.kubernetes.io/component: prepull
    spec:
      {{- if .Values.sandbox.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.sandbox.imagePullSecret }}
      {{- end }}
      tolerations:
        - operator: Exists
      containers:
        {{- if .Values.k8s.agentImageAnthropic }}
        - name: hold-anthropic
          image: {{ .Values.k8s.agentImageAnthropic | quote }}
          imagePullPolicy: IfNotPresent
          args: ["--prepull"]
          resources:
            requests:
              cpu: "1m"
              memory: "8Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
        {{- end }}
        {{- if .Values.k8s.agentImageOpenAI }}
        - name: hold-openai
          image: {{ .Values.k8s.agentImageOpenAI | quote }}
          imagePullPolicy: IfNotPresent
          args: ["--prepull"]
          resources:
            requests:
              cpu: "1m"
              memory: "8Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
        {{- end }}
      terminationGracePeriodSeconds: 1
{{- end }}
