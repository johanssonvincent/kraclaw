apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kraclaw.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels: {{ include "kraclaw.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.storage.data.size }}
  storageClassName: {{ .Values.storage.class }}
