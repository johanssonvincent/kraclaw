apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kraclaw
  namespace: argocd
  labels:
    app.kubernetes.io/name: kraclaw
    app.kubernetes.io/part-of: kraclaw-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/johanssonvincent/kraclaw.git
    targetRevision: HEAD
    path: helm
    helm:
      releaseName: kraclaw
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kraclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
