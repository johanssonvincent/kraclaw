name: Build and Push Kraclaw Container

on:
  push:
    branches: [ main, feat/multi-provider-support ]
    tags: [ 'v*' ]
    paths:
      - '**/*.go'
      - '**/*.sql'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/kraclaw.yaml'
      - '.github/workflows/test-unit.yaml'
      - '.github/workflows/test-integration.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.go'
      - '**/*.sql'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/kraclaw.yaml'
      - '.github/workflows/test-unit.yaml'
      - '.github/workflows/test-integration.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: johanssonvincent/kraclaw

jobs:
  test-unit:
    uses: ./.github/workflows/test-unit.yaml
    permissions:
      contents: read

  test-integration:
    uses: ./.github/workflows/test-integration.yaml
    permissions:
      contents: read

  lint:
    uses: ./.github/workflows/lint.yaml
    permissions:
      contents: read

  build:
    needs: [test-unit, test-integration, lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BASE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          BASE_VERSION=${BASE_VERSION#v}
          echo "base=${BASE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "pr_tag=${BASE_VERSION}-PR-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.pr_tag }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment image tag on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: kraclaw-image
          message: |
            🐳 **Image built** — `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.pr_tag }}`

            Pull with:
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.pr_tag }}
            ```

            Digest: `${{ steps.build.outputs.digest }}`
