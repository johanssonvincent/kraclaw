name: Build and Push Kraclaw Container

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - '**/*.go'
      - '**/*.sql'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/kraclaw.yaml'
      - '.github/workflows/test-unit.yaml'
      - '.github/workflows/test-integration.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.go'
      - '**/*.sql'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/kraclaw.yaml'
      - '.github/workflows/test-unit.yaml'
      - '.github/workflows/test-integration.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: johanssonvincent/kraclaw

jobs:
  test-unit:
    uses: ./.github/workflows/test-unit.yaml

  test-integration:
    uses: ./.github/workflows/test-integration.yaml

  build:
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version tag
        id: version
        run: |
          BASE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          BASE_VERSION=${BASE_VERSION#v}
          echo "base=${BASE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            echo "pr_tag=${BASE_VERSION}-pr${PR_NUM}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.pr_tag }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
